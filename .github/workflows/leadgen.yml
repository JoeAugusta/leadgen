name: LeadGen Weekly (Brands + Agencies)

on:
  schedule:
    - cron: "0 14 * * 1"  # Every Monday ~9AM ET (GitHub runs cron in UTC)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests google-api-python-client google-auth typing_extensions ddgs
      - name: Run lead generator
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python leadgen.py
