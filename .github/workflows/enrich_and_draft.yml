name: Enrich leads + draft outreach

on:
  workflow_dispatch: {}
  schedule:
    # Weekly Monday at 9:00am ET (13:00 UTC, adjust if you want)
    - cron: "0 13 * * 1"

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 google-api-python-client google-auth openai

      - name: Run enrichment + drafting
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python enrich_and_draft.py
